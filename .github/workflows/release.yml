name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Download ffprobe/ffmpeg binaries
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries
          $ffprobePath = node -e "console.log(require('ffprobe-static').path)"
          $ffmpegPath = node -e "console.log(require('ffmpeg-static'))"
          Copy-Item $ffprobePath "src-tauri/binaries/ffprobe-x86_64-pc-windows-msvc.exe"
          Copy-Item $ffmpegPath "src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Ckourse ${{ github.ref_name }}"
          releaseBody: "Veja o CHANGELOG para detalhes."
          releaseDraft: false
          prerelease: false
